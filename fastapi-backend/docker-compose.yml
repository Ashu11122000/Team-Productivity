services:

  app:
    build: .

    container_name: notes_app

    ports:
      - "8000:8000"

    depends_on:
      - db

    environment:

      # Application
      APP_NAME: Team Productivity Platform
      APP_VERSION: 1.0.0
      ENVIRONMENT: development
      DEBUG: "True"

      # Server
      HOST: 0.0.0.0
      PORT: 8000

      # Frontend
      FRONTEND_URL: http://localhost:3000

      # Database
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: notes_db
      DB_USER: postgres
      DB_PASSWORD: postgres

      # JWT
      SECRET_KEY: change_this_to_a_long_random_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      JWT_ISSUER: team-productivity-platform
      JWT_AUDIENCE: team-productivity-users

      # Future NestJS Integration
      NESTJS_API_URL: http://nestjs-backend:3001

      # Public APIs
      OPEN_LIBRARY_BASE_URL: https://openlibrary.org
      HOLIDAYS_API_BASE_URL: https://date.nager.at/api/v3

      # API
      API_V1_PREFIX: /api/v1

    volumes:
      - .:/app

    restart: unless-stopped

  db:
    image: postgres:15

    container_name: postgres_db

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notes_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: