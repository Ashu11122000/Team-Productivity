<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Verify Email</title>

    <style>
      body {
        background: #f4f4f5;
        font-family: Arial, Helvetica, sans-serif;
      }

      .container {
        width: 600px;
        margin: 40px auto;
        background: white;
        border-radius: 12px;
        overflow: hidden;
      }

      .header {
        background: #2563eb;
        color: white;
        text-align: center;
        padding: 30px;
      }

      .content {
        padding: 40px;
        line-height: 1.7;
      }

      .button {
        display: inline-block;
        margin-top: 20px;
        padding: 14px 26px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        border-radius: 8px;
      }

      .footer {
        background: #f9fafb;
        text-align: center;
        padding: 20px;
        font-size: 13px;
        color: #6b7280;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <h1>Email Verification</h1>
      </div>

      <div class="content">
        <h2>Hello {{ user_name }},</h2>

        <p>Thank you for registering.</p>

        <p>Please verify your email address by clicking the button below.</p>

        <a href="{{ verification_url }}" class="button"> Verify Email </a>

        <p>If the button doesn't work, copy this URL:</p>

        <p>{{ verification_url }}</p>

        <p>This link expires in {{ expiry_hours }} hours.</p>
      </div>

      <div class="footer">Team Productivity Platform</div>
    </div>
  </body>
</html>
